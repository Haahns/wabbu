<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Location Map</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: 1rem;
          
        }

        img {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: calc(100svh - 2rem);
            object-fit: contain;
        }

        @media (min-width: 1024px) {
            img {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>


    <img src="lokaatio.jpg" alt="Map of the event location">

    <!-- <button onclick="window.location.href='/info.html'">Info</button> -->
    <button onclick="window.location.href='/'">Takaisin etusivulle</button>
</body>
</html>
